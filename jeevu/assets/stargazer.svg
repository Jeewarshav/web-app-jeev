<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-label="A simple night-sky illustration">
  <defs>
    <radialGradient id="g" cx="20%" cy="12%" r="80%">
      <stop offset="0%" stop-color="#7aa2ff" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#0a1226" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060a16" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7aa2ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="520" height="520" rx="28" fill="url(#g)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="82" cy="78" r="2.5"/>
    <circle cx="138" cy="126" r="1.5"/>
    <circle cx="214" cy="86" r="2"/>
    <circle cx="310" cy="112" r="1.4"/>
    <circle cx="406" cy="78" r="2.1"/>
    <circle cx="456" cy="148" r="1.5"/>
    <circle cx="372" cy="178" r="1.9"/>
    <circle cx="268" cy="168" r="1.3"/>
    <circle cx="186" cy="196" r="1.7"/>
    <circle cx="114" cy="214" r="1.2"/>
    <circle cx="64" cy="168" r="1.4"/>
  </g>

  <!-- Constellation line -->
  <path
    d="M64 168 L114 214 L186 196 L268 168 L372 178 L456 148"
    fill="none"
    stroke="#7aa2ff"
    stroke-opacity="0.55"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Planet -->
  <circle cx="420" cy="250" r="46" fill="url(#p)" opacity="0.92"/>
  <path
    d="M350 250c30-16 90-18 140 0"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.35"
    stroke-width="6"
    stroke-linecap="round"
  />

  <!-- Hills -->
  <path d="M0 410c88-70 170-60 250-18 58 30 118 44 270 18v128H0z" fill="#050814" opacity="0.95"/>
  <path d="M0 438c110-70 190-40 268-2 64 30 132 38 252 6v78H0z" fill="#070a1a" opacity="0.96"/>
</svg>

